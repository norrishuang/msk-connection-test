apiVersion: apps/v1
kind: Deployment
metadata:
  name: msk-connection-test
  namespace: default
  labels:
    app: msk-connection-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: msk-connection-test
  template:
    metadata:
      labels:
        app: msk-connection-test
    spec:
      # 调度到 msk-test nodegroup (c8i.xlarge)
      nodeSelector:
        role: msk-test
      containers:
        - name: msk-connection-test
          image: 812046859005.dkr.ecr.us-east-1.amazonaws.com/msk-connection-test:latest
          env:
            - name: MSK_BROKERS
              value: "boot-vsx.kafkagotest.loqoqz.c10.kafka.us-east-1.amazonaws.com:9092,boot-gua.kafkagotest.loqoqz.c10.kafka.us-east-1.amazonaws.com:9092,boot-19y.kafkagotest.loqoqz.c10.kafka.us-east-1.amazonaws.com:9092"
            - name: MSK_TOPIC
              value: "msk-test"
            - name: TEST_MODE
              value: "prod-like"
            - name: PAUSE_DURATION
              value: "6m"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          imagePullPolicy: Always
      restartPolicy: Always
